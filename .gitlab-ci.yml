# .gitlab-ci.yml

# Use a modern Maven image with Java 21 (Temurin) as the default for all jobs.
image: maven:3.9-eclipse-temurin-21

# Defines the stages for the CI/CD pipeline.
# For now, we only have a 'test' stage.
stages:
  - test

# Defines a cache to speed up subsequent pipeline runs by reusing downloaded dependencies.
# The cache is invalidated and re-uploaded if pom.xml changes.
cache:
  key:
    files:
      - pom.xml
  paths:
    - .m2/repository

# This is the job that runs our tests.
maven-test:
  # Assigns this job to the 'test' stage.
  stage: test

  # The script that will be executed by the runner.
  # It cleans the project and runs all Maven tests with JaCoCo report generation.
  script:
    - mvn clean test

  # Extract coverage percentage from Maven logs for GitLab badge display
  coverage: '/Total.*?([0-9]{1,3})%/'

  # Defines artifacts to be saved after the job completes.
  artifacts:
    # Set the name for the artifact bundle
    name: "coverage-report"
    # We always save the test and coverage reports, even if the job fails, to allow for inspection.
    when: always
    # Specifies the path to the test reports generated by Maven Surefire and JaCoCo.
    paths:
      - target/surefire-reports/
      - target/site/jacoco/
    # Sets an expiration date for the artifacts to save storage space.
    expire_in: 1 week
    # Allows GitLab to parse the JUnit report format for display in the UI (e.g., in Merge Requests).
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml

  # Defines the rules for when this job should run.
  rules:
    # Rule 1: Run this job on any push to the 'main' branch.
    - if: '$CI_COMMIT_BRANCH == "main"'
    # Rule 2: Run this job for any merge request event targeting the 'main' branch.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
