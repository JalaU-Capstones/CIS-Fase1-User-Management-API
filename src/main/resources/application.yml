spring:
  profiles:
    active: dev
    group:
      "prod":
        - "prod"
  jpa:
    open-in-view: false

db:
  type: mysql

application-properties:
  jwt:
    secret-key: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
    expiration-time: 864000000

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3307/sd3
    username: sd3user
    password: sd3pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    mongodb:
      uri: mongodb://localhost:27017/sd3

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.cis.api: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sd3}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:sd3}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.cis.api: WARN

---
spring:
  config:
    activate:
      on-profile: migrate

  main:
    web-application-type: none

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration
      - org.springframework.boot.autoconfigure.web.servlet.DispatcherServletAutoConfiguration
      - org.springframework.boot.autoconfigure.web.servlet.error.ErrorMvcAutoConfiguration

  datasource:
    url: jdbc:mysql://localhost:3307/sd3
    username: sd3user
    password: sd3pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    mongodb:
      uri: mongodb://localhost:27017/sd3

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.cis.api: INFO
    org.springframework: WARN